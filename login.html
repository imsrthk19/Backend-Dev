<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registration | TicketArena</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styling -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5rem 1rem;
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.1);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .auth-toggle a {
            color: var(--secondary-color);
            font-weight: 600;
            cursor: pointer;
        }

        .error-message {
            color: var(--accent-color);
            background: rgba(253, 121, 168, 0.1);
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        #loginForm {
            display: block;
        }

        #registerForm {
            display: none;
        }
    </style>
</head>

<body>
    <!-- Background -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Header -->
    <header id="header" class="scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-ticket"></i> TicketArena
            </a>
            <nav class="nav-links" id="navLinks" style="display: none;">
                <a href="index.html">Home</a>
                <a href="events.html">Events</a>
            </nav>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <div id="errorMsg" class="error-message"></div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="auth-header">
                    <h2>Welcome Back</h2>
                    <p style="color: var(--text-secondary); font-size: 0.9rem;">Sign in to manage your tickets.</p>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <label style="margin-bottom: 0;">Password</label>
                        <a href="javascript:void(0)" onclick="toggleForms('forgot')"
                            style="font-size: 0.85rem; color: var(--secondary-color); text-decoration: none;">Forgot
                            Password?</a>
                    </div>
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>
                <div class="auth-toggle">
                    Don't have an account? <a onclick="toggleForms('register')">Sign Up</a>
                </div>
            </form>

            <!-- Forgot Password Form -->
            <form id="forgotPasswordForm" style="display: none;">
                <div class="auth-header">
                    <h2>Reset Password</h2>
                    <p style="color: var(--text-secondary); font-size: 0.9rem;">Enter your email to get a reset link.
                    </p>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="resetEmail" class="form-control" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Send Reset
                    Link</button>
                <div class="auth-toggle">
                    Remember your password? <a onclick="toggleForms('login')">Log In</a>
                </div>
            </form>

            <!-- Register Form -->
            <form id="registerForm">
                <div class="auth-header">
                    <h2>Create Account</h2>
                    <p style="color: var(--text-secondary); font-size: 0.9rem;">Join the best events platform.</p>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>First Name</label>
                        <input type="text" id="regFirstName" class="form-control" placeholder="John" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Last Name</label>
                        <input type="text" id="regLastName" class="form-control" placeholder="Doe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
                <div class="auth-toggle">
                    Already have an account? <a onclick="toggleForms('login')">Log In</a>
                </div>
            </form>

        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const errorMsg = document.getElementById('errorMsg');
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');

        const showError = (message) => {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        };

        const clearError = () => {
            errorMsg.textContent = '';
            errorMsg.style.display = 'none';
        };

        const toggleForms = (formType) => {
            clearError();
            loginForm.style.display = 'none';
            registerForm.style.display = 'none';
            if (forgotPasswordForm) forgotPasswordForm.style.display = 'none';

            if (formType === 'register') {
                registerForm.style.display = 'block';
            } else if (formType === 'forgot') {
                if (forgotPasswordForm) forgotPasswordForm.style.display = 'block';
            } else {
                loginForm.style.display = 'block';
            }
        };

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const response = await AuthHelper.login(email, password);
            if (!response.success) {
                showError(response.message);
                return;
            }
            window.location.href = 'home.html';
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();
            const firstName = document.getElementById('regFirstName').value.trim();
            const lastName = document.getElementById('regLastName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const response = await AuthHelper.register(firstName, lastName, email, password);
            if (!response.success) {
                showError(response.message);
                return;
            }
            window.location.href = 'home.html';
        });

        if (forgotPasswordForm) {
            forgotPasswordForm.addEventListener('submit', (e) => {
                e.preventDefault();
                showError('Forgot password is not connected to backend yet.');
            });
        }
    </script>
</body>

</html>
