<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details | TicketArena</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .event-banner {
            height: 400px;
            width: 100%;
            object-fit: cover;
            object-position: center;
        }

        .details-container {
            margin-top: -100px;
            position: relative;
            z-index: 10;
        }

        .main-card {
            padding: 3rem;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 3rem;
        }

        .ticket-tier {
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .ticket-tier:hover,
        .ticket-tier.selected {
            border-color: var(--primary-color);
            background: rgba(108, 92, 231, 0.1);
        }

        .price-tag {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--secondary-color);
        }

        @media(max-width: 992px) {
            .layout-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header id="header" class="scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-ticket"></i> TicketArena
            </a>
            <nav class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="events.html" class="active">Events</a>
            </nav>
            <div class="nav-actions" style="display:flex; gap:1rem; align-items:center;">
                <a id="authButton" href="login.html" class="btn btn-outline" style="padding: 0.5rem 1.5rem">Log In</a>
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>
    </header>

    <div id="eventDetailsView">
        <!-- Rendered by JS -->
    </div>

    <!-- Footer -->
    <footer>
        <div class="container" style="border-top: none; padding-top: 2rem;">
            <p style="text-align:center; color: var(--text-secondary);">&copy; 2026 TicketArena by Sarthak. All rights
                reserved.</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>

    <script>

        document.addEventListener('DOMContentLoaded', async () => {
            await window.loadBackendEvents?.();

            const urlParams =
                new URLSearchParams(window.location.search);

            const id = urlParams.get('id');

            const event =
                eventsData.find(
                    e => String(e.id) === String(id)
                ) || eventsData[0];

            document.getElementById(
                'eventDetailsView'
            ).innerHTML = `

<img src="${event.image}"
alt="Event Banner"
class="event-banner">

<section class="container details-container">

<div class="glass-panel main-card layout-grid">

<div class="event-info-col">

<span class="event-category">

${event.category}

</span>

<h1 style="font-size: 2.5rem;">

${event.title}

</h1>


<div style="
display:flex;
gap:2rem;
margin:2rem 0;
flex-wrap:wrap;
">

<div class="event-detail-item">

<i class="fa-solid fa-calendar"
style="font-size:1.5rem;"></i>

<div>

<strong>Date & Time</strong>

<p style="margin:0">

${formatEventDateTime(
                event.Starting_Time || event.time
            )}

</p>
</div>

</div>


<div class="event-detail-item">

<i class="fa-solid fa-location-dot"
style="font-size:1.5rem;"></i>

<div>

<strong>Location</strong>

<p style="margin:0">

${event.location}

</p>

</div>

</div>

</div>


<h3>About this Event</h3>

<p>

${event.description}

</p>

<br>

<p>

Get ready for an incredible experience.

</p>

</div>



<div class="ticket-col">

<h3>Select Tickets</h3>

<div class="ticket-tier selected"

onclick="
document.querySelectorAll('.ticket-tier')
.forEach(el=>el.classList.remove('selected'));

this.classList.add('selected');

document.getElementById('selectedTier')
.value='General'
">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
">

<h4>General Admission</h4>

<div class="price-tag">

₹${event.price.toFixed(2)}

</div>

</div>

</div>


<input type="hidden"
id="selectedTier"
value="General">


<div style="
margin-top:2rem;
background:rgba(0,0,0,0.2);
padding:1.5rem;
border-radius:12px;
">

<div style="
display:flex;
justify-content:space-between;
margin-bottom:1rem;
">

<span>Quantity</span>

<input
type="number"
id="ticketQty"
value="1"
min="1"
max="10"
style="
width:60px;
padding:5px;
border-radius:5px;
">

</div>

<button
class="btn btn-primary"
style="width:100%;"
onclick="proceedToCheckout(${event.id})">

Checkout Now

</button>

</div>

</div>

</div>

</section>

`;

        });



        /* ===============================
        CALENDAR FORMAT FUNCTION
        =============================== */

        function formatEventDateTime(dateString) {

            const date =
                new Date(dateString);

            return date.toLocaleString(
                'en-US',
                {

                    weekday: 'long',
                    month: 'long',
                    day: 'numeric',
                    year: 'numeric',

                    hour: '2-digit',
                    minute: '2-digit',

                    hour12: false

                }

            );

        }



        /* ===============================
        CHECKOUT
        =============================== */

        const proceedToCheckout =
            (eventId) => {

                const tier =
                    document.getElementById(
                        'selectedTier'
                    ).value;

                const qty =
                    document.getElementById(
                        'ticketQty'
                    ).value;

                window.location.href =
                    `checkout.html?id=${eventId}&tier=${tier}&qty=${qty}`;

            };

    </script>
</body>

</html>
